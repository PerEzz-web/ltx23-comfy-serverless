name: Build and push Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "handler.py"
      - "LTX-2-3-AUTO_INSTALL-RUNPOD-V2.sh"
      - "scripts/**"
      - "workflows/**"
      - ".github/workflows/docker-build.yml"

env:
  IMAGE_NAME: ltx23-comfy-serverless
  IMAGE_TAG: cu128-v1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub secrets
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import os

          user = os.environ.get("DH_USER", "")
          token = os.environ.get("DH_TOKEN", "")

          print("Username set:", bool(user))
          print("Username:", user)
          print("Token set:", bool(token))
          print("Token length:", len(token))
          print("Username has surrounding spaces:", user != user.strip())
          print("Token has surrounding spaces:", token != token.strip())
          print("Token contains newline:", ("\n" in token) or ("\r" in token))

          if not user:
              raise SystemExit("DOCKERHUB_USERNAME is empty")
          if not token:
              raise SystemExit("DOCKERHUB_TOKEN is empty")
          if user != user.strip():
              raise SystemExit("DOCKERHUB_USERNAME has extra spaces")
          if token != token.strip():
              raise SystemExit("DOCKERHUB_TOKEN has extra spaces")
          if "\n" in token or "\r" in token:
              raise SystemExit("DOCKERHUB_TOKEN contains newline")
          PY

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
